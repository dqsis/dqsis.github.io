<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 · Knockout Bracket · DQSIS</title>
<link rel="stylesheet" href="../styles/style.css">
<style>
.bracket-scroll { overflow-x: auto; padding-bottom: 1.5rem; -webkit-overflow-scrolling: touch; }
.bracket { display: flex; align-items: stretch; min-width: 1050px; }
.round-col { display: flex; flex-direction: column; flex: 1; min-width: 148px; padding: 0 3px; }
.round-col:first-child { padding-left: 0; }
.round-col:last-child { padding-right: 0; }
.round-label { font-size: 0.58rem; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--olive); text-align: center; padding-bottom: 0.45rem; border-bottom: 1px solid var(--sand); margin-bottom: 0.6rem; white-space: nowrap; }
.round-final .round-label { color: var(--terracotta); }
.matches-col { display: flex; flex-direction: column; justify-content: space-around; flex: 1; gap: 5px; }
.match-wrap { display: flex; align-items: center; flex: 1; min-height: 58px; }
.match-card { background: white; border: 1px solid var(--sand); border-radius: 5px; overflow: hidden; width: 100%; }
.round-final .match-card { border-color: var(--terracotta); border-width: 1.5px; }
.match-meta { font-size: 0.58rem; color: var(--olive); padding: 2px 6px; background: var(--ghost); border-bottom: 1px solid var(--sand); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.team-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 6px; gap: 3px; }
.team-row + .team-row { border-top: 1px solid var(--sand); }
.team-row.winner { background: var(--ghost); }
.team-row.tbd .team-name { color: var(--mid); font-style: italic; font-size: 0.67rem; }
.team-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink); font-size: 0.72rem; }
.team-row.winner .team-name { font-weight: 600; }
.team-score { font-weight: 600; font-size: 0.78rem; color: var(--mid); min-width: 14px; text-align: right; flex-shrink: 0; }
.team-score.winner { color: var(--terracotta); }
.connector { width: 20px; flex-shrink: 0; position: relative; }
.bracket-svg { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; }
.bracket-scroll { position: relative; }
.champion-wrap { text-align: center; margin-top: 0.6rem; }
.champion-trophy { font-size: 1.4rem; line-height: 1; }
.champion-label { font-size: 0.6rem; color: var(--terracotta); font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 3px; }
.champion-name { font-size: 0.82rem; font-weight: 700; color: var(--ink); margin-top: 2px; }
.status-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.5rem; }
.status-text { font-size: 0.75rem; color: var(--mid); font-style: italic; }
.refresh-btn { font-family: 'Inter', sans-serif; font-size: 0.72rem; font-weight: 500; color: var(--terracotta); background: white; border: 1px solid var(--terracotta); border-radius: 4px; padding: 4px 14px; cursor: pointer; letter-spacing: 0.04em; transition: all 0.15s; }
.refresh-btn:hover { background: var(--terracotta); color: white; }
.refresh-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.loading { text-align: center; padding: 3rem 0; color: var(--mid); font-size: 0.85rem; font-style: italic; }
.error { background: white; border: 1px solid var(--sand); border-radius: 5px; padding: 1.2rem; text-align: center; color: var(--mid); font-size: 0.82rem; }
</style>
</head>
<body>
<div class="page">
  <header class="site-header">
    <a href="https://dqsis.com" class="site-logo" target="_blank" rel="noopener">
      <img src="https://dqsis.com/images/groupworkout_icon.png" alt="DQSIS logo">
      <span class="site-logo-name">DQSIS<span class="site-logo-sub">Dimitrios Kiousis</span></span>
    </a>
    <span class="site-nav">Life 2.0 · Experiments</span>
  </header>

  <header class="header">
    <p class="eyebrow">FIFA World Cup 2026</p>
    <h1 class="title">Knockout<br><em>Bracket.</em></h1>
    <p class="subtitle">Round of 32 through the Final. All times in Stockholm (CEST). Updated daily from open data.</p>
  </header>

  <div class="status-bar">
    <span class="status-text" id="status-text">Loading…</span>
    <button class="refresh-btn" id="refresh-btn" onclick="load()" disabled>↻ Refresh</button>
  </div>

  <div id="root"><div class="loading">Fetching latest results…</div></div>

  <footer class="site-footer">DQSIS · Life 2.0 · FIFA World Cup 2026 · Data: openfootball</footer>
</div>

<script>
// ── Flags ─────────────────────────────────────────────────────────────────────
const FLAGS = {
  "Mexico":"🇲🇽","South Africa":"🇿🇦","South Korea":"🇰🇷","Czech Republic":"🇨🇿",
  "Canada":"🇨🇦","Bosnia & Herzegovina":"🇧🇦","Qatar":"🇶🇦","Switzerland":"🇨🇭",
  "Brazil":"🇧🇷","Morocco":"🇲🇦","Haiti":"🇭🇹","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿",
  "USA":"🇺🇸","Paraguay":"🇵🇾","Australia":"🇦🇺","Türkiye":"🇹🇷","Turkey":"🇹🇷",
  "Germany":"🇩🇪","Curaçao":"🇨🇼","Ivory Coast":"🇨🇮","Côte d'Ivoire":"🇨🇮","Ecuador":"🇪🇨",
  "Netherlands":"🇳🇱","Japan":"🇯🇵","Sweden":"🇸🇪","Tunisia":"🇹🇳",
  "Belgium":"🇧🇪","Egypt":"🇪🇬","IR Iran":"🇮🇷","Iran":"🇮🇷","New Zealand":"🇳🇿",
  "Spain":"🇪🇸","Cabo Verde":"🇨🇻","Cape Verde":"🇨🇻","Saudi Arabia":"🇸🇦","Uruguay":"🇺🇾",
  "France":"🇫🇷","Senegal":"🇸🇳","Iraq":"🇮🇶","Norway":"🇳🇴",
  "Argentina":"🇦🇷","Algeria":"🇩🇿","Austria":"🇦🇹","Jordan":"🇯🇴",
  "Portugal":"🇵🇹","DR Congo":"🇨🇩","Uzbekistan":"🇺🇿","Colombia":"🇨🇴",
  "England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croatia":"🇭🇷","Ghana":"🇬🇭","Panama":"🇵🇦",
  "Senegal":"🇸🇳","Bosnia-Herz.":"🇧🇦",
};
const flag = n => FLAGS[n] || "🏳️";

// ── Hardcoded bracket skeleton (dates in CEST) ────────────────────────────────
// team1/team2: known teams or "TBD". score: null until played.
const SKELETON = [
  {
    id: "Round of 32", label: "Round of 32",
    matches: [
      { date:"28 Jun · 02:00", team1:"South Africa",        team2:"Canada",            score:null },
      { date:"29 Jun · 02:00", team1:"Brazil",              team2:"Japan",             score:null },
      { date:"29 Jun · 04:00", team1:"Mexico",              team2:"TBD",               score:null },
      { date:"29 Jun · 05:30", team1:"Germany",             team2:"TBD",               score:null },
      { date:"30 Jun · 02:00", team1:"Portugal",            team2:"Sweden",            score:null },
      { date:"30 Jun · 04:00", team1:"Netherlands",         team2:"Morocco",           score:null },
      { date:"30 Jun · 06:00", team1:"Norway",              team2:"Côte d'Ivoire",     score:null },
      { date:"01 Jul · 02:00", team1:"France",              team2:"TBD",               score:null },
      { date:"01 Jul · 04:00", team1:"USA",                 team2:"Bosnia & Herzegovina", score:null },
      { date:"01 Jul · 06:00", team1:"Argentina",           team2:"Cabo Verde",        score:null },
      { date:"02 Jul · 02:00", team1:"Spain",               team2:"TBD",               score:null },
      { date:"02 Jul · 04:00", team1:"TBD",                 team2:"TBD",               score:null },
      { date:"03 Jul · 00:00", team1:"Belgium",             team2:"TBD",               score:null },
      { date:"03 Jul · 02:00", team1:"England",             team2:"Ghana",             score:null },
      { date:"03 Jul · 04:00", team1:"Colombia",            team2:"TBD",               score:null },
      { date:"03 Jul · 06:00", team1:"Egypt",               team2:"Paraguay",          score:null },
    ]
  },
  {
    id: "Round of 16", label: "Round of 16",
    matches: [
      { date:"05 Jul · 01:00", team1:"TBD", team2:"TBD", score:null },
      { date:"05 Jul · 03:00", team1:"TBD", team2:"TBD", score:null },
      { date:"06 Jul · 01:00", team1:"TBD", team2:"TBD", score:null },
      { date:"06 Jul · 03:00", team1:"TBD", team2:"TBD", score:null },
      { date:"07 Jul · 01:00", team1:"TBD", team2:"TBD", score:null },
      { date:"07 Jul · 03:00", team1:"TBD", team2:"TBD", score:null },
      { date:"08 Jul · 01:00", team1:"TBD", team2:"TBD", score:null },
      { date:"08 Jul · 03:00", team1:"TBD", team2:"TBD", score:null },
    ]
  },
  {
    id: "Quarter-finals", label: "Quarter-finals",
    matches: [
      { date:"10 Jul · 01:00", team1:"TBD", team2:"TBD", score:null },
      { date:"10 Jul · 03:00", team1:"TBD", team2:"TBD", score:null },
      { date:"11 Jul · 01:00", team1:"TBD", team2:"TBD", score:null },
      { date:"11 Jul · 03:00", team1:"TBD", team2:"TBD", score:null },
    ]
  },
  {
    id: "Semi-finals", label: "Semi-finals",
    matches: [
      { date:"14 Jul · 23:00", team1:"TBD", team2:"TBD", score:null },
      { date:"15 Jul · 23:00", team1:"TBD", team2:"TBD", score:null },
    ]
  },
  {
    id: "Final", label: "Final · New York",
    matches: [
      { date:"19 Jul · 23:00", team1:"TBD", team2:"TBD", score:null },
    ]
  }
];

// ── Round name aliases from openfootball ──────────────────────────────────────
const ROUND_ALIASES = {
  "Round of 32":    "Round of 32",
  "Round of 16":    "Round of 16",
  "Quarterfinal":   "Quarter-finals",
  "Quarter-final":  "Quarter-finals",
  "Quarter-finals": "Quarter-finals",
  "Semifinal":      "Semi-finals",
  "Semi-final":     "Semi-finals",
  "Semi-finals":    "Semi-finals",
  "Final":          "Final",
};

// ── CEST conversion ───────────────────────────────────────────────────────────
function toCEST(timeStr) {
  const m = timeStr && timeStr.match(/(\d+):(\d+)\s*UTC([+-]\d+)/);
  if (!m) return timeStr || "";
  const utcH = parseInt(m[1]) - parseInt(m[3]);
  const cestH = ((utcH + 2) % 24 + 24) % 24;
  return `${cestH.toString().padStart(2,'0')}:${m[2]}`;
}

function fmtDate(dateStr, timeStr) {
  const d = new Date(dateStr + "T12:00:00Z");
  const day = d.toLocaleDateString('sv-SE', { month:'short', day:'numeric' });
  return `${day} · ${toCEST(timeStr)}`;
}

// ── Match winner ──────────────────────────────────────────────────────────────
function winner(m) {
  if (!m.score || !m.score.ft) return null;
  const [s1, s2] = m.score.ft;
  if (s1 > s2) return "team1";
  if (s2 > s1) return "team2";
  if (m.score.pen) return m.score.pen[0] > m.score.pen[1] ? "team1" : "team2";
  return null;
}

// ── Merge API data into skeleton ──────────────────────────────────────────────
function merge(skeleton, apiMatches) {
  // Group API knockout matches by normalised round name
  const byRound = {};
  for (const m of apiMatches) {
    const norm = ROUND_ALIASES[m.round];
    if (!norm) continue;
    if (!byRound[norm]) byRound[norm] = [];
    byRound[norm].push(m);
  }

  return skeleton.map(round => {
    const live = byRound[round.id];
    if (!live || !live.length) return round; // no data yet — keep skeleton

    // Sort by date so order is consistent
    live.sort((a,b) => new Date(a.date) - new Date(b.date));

    const merged = round.matches.map((slot, i) => {
      const lm = live[i];
      if (!lm) return slot;
      return {
        date: fmtDate(lm.date, lm.time),
        team1: lm.team1 || slot.team1,
        team2: lm.team2 || slot.team2,
        score: lm.score || null,
        ground: lm.ground,
      };
    });
    return { ...round, matches: merged };
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderMatch(m) {
  const w = winner(m);
  const played = m.score && m.score.ft;
  const t1 = m.team1 || "TBD";
  const t2 = m.team2 || "TBD";
  const tbd1 = t1 === "TBD";
  const tbd2 = t2 === "TBD";
  const s1 = played ? m.score.ft[0] : "";
  const s2 = played ? m.score.ft[1] : "";
  const meta = typeof m.date === "string" ? m.date : fmtDate(m.date, "");
  const ground = m.ground ? ` · ${m.ground}` : "";

  return `<div class="match-wrap"><div class="match-card">
    <div class="match-meta">${meta}${ground}</div>
    <div class="team-row${w==='team1'?' winner':''}${tbd1?' tbd':''}">
      <span class="team-name">${flag(t1)} ${t1}</span>
      <span class="team-score${w==='team1'?' winner':''}">${s1}</span>
    </div>
    <div class="team-row${w==='team2'?' winner':''}${tbd2?' tbd':''}">
      <span class="team-name">${flag(t2)} ${t2}</span>
      <span class="team-score${w==='team2'?' winner':''}">${s2}</span>
    </div>
  </div></div>`;
}

function render(bracket) {
  let html = '<div class="bracket-scroll"><div class="bracket">';
  bracket.forEach((round, ri) => {
    const isFinal = round.id === "Final";
    html += `<div class="round-col${isFinal?' round-final':''}">`;
    html += `<div class="round-label">${round.label}</div>`;
    html += `<div class="matches-col">`;
    round.matches.forEach(m => { html += renderMatch(m); });
    html += `</div>`;
    if (isFinal) {
      const fm = round.matches[0];
      const w = winner(fm);
      if (w) {
        const champ = w === "team1" ? fm.team1 : fm.team2;
        html += `<div class="champion-wrap">
          <div class="champion-trophy">🏆</div>
          <div class="champion-label">World Champion</div>
          <div class="champion-name">${flag(champ)} ${champ}</div>
        </div>`;
      }
    }
    html += `</div>`;
    if (ri < bracket.length - 1) html += `<div class="connector"></div>`;
  });
  html += '</div></div>';
  document.getElementById("root").innerHTML = html;
}

// ── Load ──────────────────────────────────────────────────────────────────────
async function load() {
  const btn = document.getElementById("refresh-btn");
  const status = document.getElementById("status-text");
  btn.disabled = true;
  status.textContent = "Fetching…";

  // Render skeleton immediately
  render(SKELETON);

  try {
    const urls = [
      "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json",
      "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup_finals.json",
    ];
    const results = await Promise.allSettled(urls.map(u => fetch(u).then(r => r.ok ? r.json() : null)));
    let allMatches = [];
    for (const r of results) {
      if (r.status === "fulfilled" && r.value && r.value.matches) {
        allMatches = allMatches.concat(r.value.matches);
      }
    }

    const bracket = merge(SKELETON, allMatches);
    render(bracket);

    const played = bracket.flatMap(r => r.matches).filter(m => m.score && m.score.ft).length;
    status.textContent = `Updated ${new Date().toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'})} CEST · ${played} knockout match${played!==1?'es':''} played`;
  } catch (err) {
    status.textContent = "Showing scheduled fixtures — could not fetch live data";
    console.warn(err);
  }

  btn.disabled = false;
}

load();
</script>
</body>
</html>
