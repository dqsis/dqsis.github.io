<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 В· Knockout Bracket В· DQSIS</title>
<link rel="stylesheet" href="https://dqsis.com/experiments/style.css">
<style>
.bracket-scroll { overflow-x: auto; padding-bottom: 1.5rem; -webkit-overflow-scrolling: touch; }
.bracket { display: flex; align-items: stretch; min-width: 1050px; }
.round-col { display: flex; flex-direction: column; flex: 1; min-width: 148px; padding: 0 3px; }
.round-col:first-child { padding-left: 0; }
.round-col:last-child { padding-right: 0; }
.round-label {
  font-size: 0.58rem; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--olive); text-align: center; padding-bottom: 0.45rem;
  border-bottom: 1px solid var(--sand); margin-bottom: 0.6rem; white-space: nowrap;
}
.round-final .round-label { color: var(--terracotta); }
.matches-col { display: flex; flex-direction: column; justify-content: space-around; flex: 1; gap: 5px; }
.match-wrap { display: flex; align-items: center; flex: 1; min-height: 58px; }
.match-card { background: white; border: 1px solid var(--sand); border-radius: 5px; overflow: hidden; width: 100%; }
.round-final .match-card { border-color: var(--terracotta); border-width: 1.5px; }
.match-meta { font-size: 0.58rem; color: var(--olive); padding: 2px 6px; background: var(--ghost); border-bottom: 1px solid var(--sand); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.team-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 6px; gap: 3px; }
.team-row + .team-row { border-top: 1px solid var(--sand); }
.team-row.winner { background: var(--ghost); }
.team-row.tbd .team-name { color: var(--mid); font-style: italic; }
.team-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink); font-size: 0.72rem; }
.team-row.winner .team-name { font-weight: 600; }
.team-score { font-weight: 600; font-size: 0.78rem; color: var(--mid); min-width: 14px; text-align: right; flex-shrink: 0; }
.team-score.winner { color: var(--terracotta); }
.connector { width: 10px; flex-shrink: 0; }
.connector::before { content: ''; display: block; height: 1px; background: var(--sand); margin-top: 29px; }
.champion-wrap { text-align: center; margin-top: 0.6rem; }
.champion-trophy { font-size: 1.4rem; line-height: 1; }
.champion-label { font-size: 0.6rem; color: var(--terracotta); font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 3px; }
.champion-name { font-size: 0.82rem; font-weight: 700; color: var(--ink); margin-top: 2px; }
.status-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.5rem; }
.status-text { font-size: 0.75rem; color: var(--mid); font-style: italic; }
.refresh-btn {
  font-family: 'Inter', sans-serif; font-size: 0.72rem; font-weight: 500;
  color: var(--terracotta); background: white; border: 1px solid var(--terracotta);
  border-radius: 4px; padding: 4px 14px; cursor: pointer; letter-spacing: 0.04em; transition: all 0.15s;
}
.refresh-btn:hover { background: var(--terracotta); color: white; }
.refresh-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.loading { text-align: center; padding: 3rem 0; color: var(--mid); font-size: 0.85rem; font-style: italic; }
.error { background: white; border: 1px solid var(--sand); border-radius: 5px; padding: 1.2rem; text-align: center; color: var(--mid); font-size: 0.82rem; }
</style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <a href="https://dqsis.com" class="site-logo" target="_blank" rel="noopener">
      <img src="https://dqsis.com/images/groupworkout_icon.png" alt="DQSIS logo">
      <span class="site-logo-name">DQSIS<span class="site-logo-sub">Dimitrios Kiousis</span></span>
    </a>
    <span class="site-nav">Life 2.0 В· Experiments</span>
  </header>

  <header class="header">
    <p class="eyebrow">FIFA World Cup 2026</p>
    <h1 class="title">Knockout<br><em>Bracket.</em></h1>
    <p class="subtitle">Round of 32 through the Final. All times in Stockholm (CEST). Updated daily from open data.</p>
  </header>

  <div class="status-bar">
    <span class="status-text" id="status-text">LoadingвЂ¦</span>
    <button class="refresh-btn" id="refresh-btn" onclick="load()" disabled>в†» Refresh</button>
  </div>

  <div id="root"><div class="loading">Fetching latest resultsвЂ¦</div></div>

  <footer class="site-footer">DQSIS В· Life 2.0 В· FIFA World Cup 2026 В· Data: openfootball</footer>
</div>

<script>
// в”Ђв”Ђ Flag lookup в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const FLAGS = {
  "Mexico":"рџ‡Ірџ‡Ѕ","South Africa":"рџ‡їрџ‡¦","South Korea":"рџ‡°рџ‡·","Czech Republic":"рџ‡Ёрџ‡ї",
  "Canada":"рџ‡Ёрџ‡¦","Bosnia & Herzegovina":"рџ‡§рџ‡¦","Qatar":"рџ‡¶рџ‡¦","Switzerland":"рџ‡Ёрџ‡­",
  "Brazil":"рџ‡§рџ‡·","Morocco":"рџ‡Ірџ‡¦","Haiti":"рџ‡­рџ‡№","Scotland":"рџЏґу Ѓ§у Ѓўу Ѓіу ЃЈу Ѓґу Ѓї",
  "USA":"рџ‡єрџ‡ё","Paraguay":"рџ‡µрџ‡ѕ","Australia":"рџ‡¦рџ‡є","TГјrkiye":"рџ‡№рџ‡·","Turkey":"рџ‡№рџ‡·",
  "Germany":"рџ‡©рџ‡Є","CuraГ§ao":"рџ‡Ёрџ‡ј","Ivory Coast":"рџ‡Ёрџ‡®","CГґte d'Ivoire":"рџ‡Ёрџ‡®","Ecuador":"рџ‡Єрџ‡Ё",
  "Netherlands":"рџ‡ірџ‡±","Japan":"рџ‡Їрџ‡µ","Sweden":"рџ‡ёрџ‡Є","Tunisia":"рџ‡№рџ‡і",
  "Belgium":"рџ‡§рџ‡Є","Egypt":"рџ‡Єрџ‡¬","IR Iran":"рџ‡®рџ‡·","Iran":"рџ‡®рџ‡·","New Zealand":"рџ‡ірџ‡ї",
  "Spain":"рџ‡Єрџ‡ё","Cabo Verde":"рџ‡Ёрџ‡»","Cape Verde":"рџ‡Ёрџ‡»","Saudi Arabia":"рџ‡ёрџ‡¦","Uruguay":"рџ‡єрџ‡ѕ",
  "France":"рџ‡«рџ‡·","Senegal":"рџ‡ёрџ‡і","Iraq":"рџ‡®рџ‡¶","Norway":"рџ‡ірџ‡ґ",
  "Argentina":"рџ‡¦рџ‡·","Algeria":"рџ‡©рџ‡ї","Austria":"рџ‡¦рџ‡№","Jordan":"рџ‡Їрџ‡ґ",
  "Portugal":"рџ‡µрџ‡№","DR Congo":"рџ‡Ёрџ‡©","Uzbekistan":"рџ‡єрџ‡ї","Colombia":"рџ‡Ёрџ‡ґ",
  "England":"рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї","Croatia":"рџ‡­рџ‡·","Ghana":"рџ‡¬рџ‡­","Panama":"рџ‡µрџ‡¦",
};

function flag(name) { return FLAGS[name] || "рџЏіпёЏ"; }

// в”Ђв”Ђ Round order в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const ROUND_ORDER = ["Round of 32","Round of 16","Quarter-finals","Semi-finals","Final"];
const ROUND_LABELS = {
  "Round of 32": "Round of 32",
  "Round of 16": "Round of 16",
  "Quarter-finals": "Quarter-finals",
  "Semi-finals": "Semi-finals",
  "Final": "Final В· New York"
};

// в”Ђв”Ђ UTC offset for UTC string in data в†’ CEST (UTC+2) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function toCEST(dateStr, timeStr) {
  if (!timeStr) return dateStr;
  // timeStr like "13:00 UTC-6"
  const m = timeStr.match(/(\d+):(\d+)\s*UTC([+-]\d+)/);
  if (!m) return timeStr;
  const [,h,min,off] = m;
  const utcH = parseInt(h) - parseInt(off); // convert to UTC
  const cestH = utcH + 2; // CEST = UTC+2
  const finalH = ((cestH % 24) + 24) % 24;
  return `${finalH.toString().padStart(2,'0')}:${min}`;
}

function formatDate(dateStr, timeStr) {
  const d = new Date(dateStr);
  const day = d.toLocaleDateString('sv-SE', { month:'short', day:'numeric' });
  const t = toCEST(dateStr, timeStr);
  return `${day} В· ${t}`;
}

// в”Ђв”Ђ Determine winner в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function getWinner(match) {
  if (!match.score || !match.score.ft) return null;
  const [s1, s2] = match.score.ft;
  if (s1 > s2) return "team1";
  if (s2 > s1) return "team2";
  // Check penalty shootout
  if (match.score.pen) {
    const [p1, p2] = match.score.pen;
    return p1 > p2 ? "team1" : "team2";
  }
  return null;
}

// в”Ђв”Ђ Build bracket from flat match list в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function buildBracket(matches) {
  const rounds = {};
  for (const m of matches) {
    const r = m.round;
    if (!ROUND_ORDER.includes(r)) continue;
    if (!rounds[r]) rounds[r] = [];
    rounds[r].push(m);
  }
  return ROUND_ORDER.filter(r => rounds[r]).map(r => ({ id: r, matches: rounds[r] }));
}

// в”Ђв”Ђ Render в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderMatch(m) {
  const winner = getWinner(m);
  const played = m.score && m.score.ft;
  const t1win = winner === "team1";
  const t2win = winner === "team2";
  const t1 = m.team1 || "TBD";
  const t2 = m.team2 || "TBD";
  const tbd1 = !m.team1;
  const tbd2 = !m.team2;
  const s1 = played ? m.score.ft[0] : "";
  const s2 = played ? m.score.ft[1] : "";

  return `<div class="match-wrap"><div class="match-card">
    <div class="match-meta">${formatDate(m.date, m.time)}${m.ground ? ' В· ' + m.ground : ''}</div>
    <div class="team-row${t1win?' winner':''}${tbd1?' tbd':''}">
      <span class="team-name">${flag(t1)} ${t1}</span>
      <span class="team-score${t1win?' winner':''}">${s1}</span>
    </div>
    <div class="team-row${t2win?' winner':''}${tbd2?' tbd':''}">
      <span class="team-name">${flag(t2)} ${t2}</span>
      <span class="team-score${t2win?' winner':''}">${s2}</span>
    </div>
  </div></div>`;
}

function render(bracket) {
  const root = document.getElementById("root");
  if (!bracket.length) {
    root.innerHTML = '<div class="error">No knockout matches found yet вЂ” check back after 28 June.</div>';
    return;
  }

  let html = '<div class="bracket-scroll"><div class="bracket">';
  bracket.forEach((round, ri) => {
    const isFinal = round.id === "Final";
    html += `<div class="round-col${isFinal?' round-final':''}">`;
    html += `<div class="round-label">${ROUND_LABELS[round.id]}</div>`;
    html += `<div class="matches-col">`;
    round.matches.forEach(m => { html += renderMatch(m); });
    html += `</div>`;

    if (isFinal && round.matches.length) {
      const fm = round.matches[0];
      const w = getWinner(fm);
      if (w) {
        const champ = w === "team1" ? fm.team1 : fm.team2;
        html += `<div class="champion-wrap">
          <div class="champion-trophy">рџЏ†</div>
          <div class="champion-label">World Champion</div>
          <div class="champion-name">${flag(champ)} ${champ}</div>
        </div>`;
      }
    }

    html += `</div>`;
    if (ri < bracket.length - 1) html += `<div class="connector"></div>`;
  });
  html += '</div></div>';
  root.innerHTML = html;
}

// в”Ђв”Ђ Fetch & load в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function load() {
  const btn = document.getElementById("refresh-btn");
  const status = document.getElementById("status-text");
  btn.disabled = true;
  status.textContent = "FetchingвЂ¦";

  try {
    // Also try to fetch the finals file if it exists
    const [mainResp, finalsResp] = await Promise.allSettled([
      fetch("https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json"),
      fetch("https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup_finals.json")
    ]);

    let allMatches = [];

    if (mainResp.status === "fulfilled" && mainResp.value.ok) {
      const data = await mainResp.value.json();
      allMatches = allMatches.concat(data.matches || []);
    }

    if (finalsResp.status === "fulfilled" && finalsResp.value.ok) {
      const data = await finalsResp.value.json();
      allMatches = allMatches.concat(data.matches || []);
    }

    const bracket = buildBracket(allMatches);

    if (!bracket.length) {
      document.getElementById("root").innerHTML =
        '<div class="error">Knockout stage not yet started вЂ” group stage ends 27 June. Check back from 28 June.</div>';
      status.textContent = "Group stage in progress";
    } else {
      render(bracket);
      const played = bracket.flatMap(r => r.matches).filter(m => m.score && m.score.ft).length;
      status.textContent = `Updated ${new Date().toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'})} CEST В· ${played} match${played!==1?'es':''} played`;
    }

  } catch (err) {
    document.getElementById("root").innerHTML =
      `<div class="error">Could not fetch data вЂ” check your connection and try refreshing.<br><small style="color:var(--mid)">${err.message}</small></div>`;
    status.textContent = "Error loading data";
    console.error(err);
  }

  btn.disabled = false;
}

load();
</script>
</body>
</html>
